<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Absensi</title>

<style>
body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
}

.header {
  background: #1e88e5;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

.container {
  padding: 15px;
}

.search {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

button {
  padding: 10px 15px;
  background: #1e88e5;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* CARD */
.card {
  background: white;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* ROW RAPi */
.row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid #eee;
  font-size: 14px;
}

.label {
  font-weight: bold;
  color: #444;
}

.value {
  color: #000;
}

.title {
  font-weight: bold;
  margin-bottom: 8px;
  color: #1e88e5;
}
</style>

</head>

<body>

<div class="header">Dashboard Absensi Karyawan</div>

<div class="container">

<div class="search">
  <input id="nama" placeholder="Cari nama (contoh: Ayung)">
  <button onclick="cari()">Cari</button>
</div>

<div id="hasil"></div>

</div>

<script>

const API = "PASTE_URL_KAMU?action=absen&nama=";

async function cari() {

  const nama = document.getElementById("nama").value;
  const box = document.getElementById("hasil");

  box.innerHTML = "Loading...";

  try {

    const res = await fetch(API + encodeURIComponent(nama));
    const data = await res.json();

    if (!data.length) {
      box.innerHTML = "Tidak ada data";
      return;
    }

    box.innerHTML = "";

    data.forEach(d => {

      box.innerHTML += `
        <div class="card">

          <div class="title">${d.nama}</div>

          <div class="row">
            <div class="label">Tanggal</div>
            <div class="value">${d.tanggal}</div>
          </div>

          <div class="row">
            <div class="label">Masuk</div>
            <div class="value">${d.masuk}</div>
          </div>

          <div class="row">
            <div class="label">Istirahat 1</div>
            <div class="value">${d.ist1}</div>
          </div>

          <div class="row">
            <div class="label">Kembali 1</div>
            <div class="value">${d.kembali1}</div>
          </div>

          <div class="row">
            <div class="label">Istirahat 2</div>
            <div class="value">${d.ist2}</div>
          </div>

          <div class="row">
            <div class="label">Kembali 2</div>
            <div class="value">${d.kembali2}</div>
          </div>

          <div class="row">
            <div class="label">Pulang</div>
            <div class="value">${d.pulang}</div>
          </div>

        </div>
      `;

    });

  } catch (err) {
    box.innerHTML = "ERROR: " + err;
  }
}

</script>

</body>
</html>
