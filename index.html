<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Absensi</title>

<style>
body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
}

.header {
  background: #1e88e5;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

input {
  width: 70%;
  padding: 10px;
}

button {
  padding: 10px;
  background: #1e88e5;
  color: white;
  border: none;
}

.card {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>

</head>

<body>

<div class="header">Dashboard Absensi</div>

<div class="container">

<input id="nama" placeholder="Masukkan nama">
<button onclick="cari()">Cari</button>

<div id="hasil"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyQrY0plburM7doI2I0A6mGq3_hisHm0w26RbP5VuLorKM7onuxWGgECir_q1-L860c/exec?action=absen&nama=";

async function cari() {

  const nama = document.getElementById("nama").value;
  const box = document.getElementById("hasil");

  box.innerHTML = "Loading...";

  try {

    const res = await fetch(API + encodeURIComponent(nama));
    const data = await res.json();

    if (!data.length) {
      box.innerHTML = "Tidak ada data";
      return;
    }

    box.innerHTML = "";

    data.forEach(d => {

      box.innerHTML += `
        <div class="card">
          <b>${d.nama}</b><br>
          TANGGAL: ${d.tanggal}<br>
          MASUK: ${d.masuk}<br>
          ISTIRAHAT 1: ${d.ist1}<br>
          KEMBALI 1: ${d.kembali1}<br>
          PULANG: ${d.pulang}
        </div>
      `;

    });

  } catch (err) {
    box.innerHTML = "ERROR: " + err;
  }
}

</script>

</body>
</html>
