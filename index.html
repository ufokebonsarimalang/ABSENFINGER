<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Absensi</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .box {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .card {
      margin-top: 15px;
      padding: 10px;
      border-left: 5px solid #2196f3;
      background: #fafafa;
    }

    .telat {
      color: red;
      font-weight: bold;
    }

    .lembur {
      color: orange;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Dashboard Absensi</h2>

  <input id="nama" placeholder="Masukkan nama">
  <button onclick="cari()">Cari</button>

  <div id="hasil"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyQrY0plburM7doI2I0A6mGq3_hisHm0w26RbP5VuLorKM7onuxWGgECir_q1-L860c/exec";

async function cari() {
  let nama = document.getElementById("nama").value;

  let res = await fetch(API + nama);
  let data = await res.json();

  let html = "";

  data.forEach(d => {

    html += `
      <div class="card">
        <b>📅 ${d.tanggal}</b><br>
        Shift : ${d.shift}<br><br>

        Masuk : ${d.masuk} ${d.status === "TELAT" ? '<span class="telat">❌ TELAT</span>' : '✅'}<br>

        Ist1 : - <br>
        Kembali1 : - <br>
        Ist2 : - <br>
        Kembali2 : - <br>

        Pulang : ${d.pulang} ${d.lembur ? '<span class="lembur">🟡 LEMBUR</span>' : ''}
      </div>
    `;

  });

  document.getElementById("hasil").innerHTML = html;
}

</script>

</body>
</html>
