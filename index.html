<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Absensi</title>

<style>
body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
}

.header {
  background: #1e88e5;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

.container {
  padding: 15px;
}

.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

button {
  padding: 10px 15px;
  border: none;
  background: #1e88e5;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.title {
  font-weight: bold;
  margin-bottom: 5px;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin: 3px 0;
}

.badge {
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 12px;
  color: white;
}

.ok { background: green; }
.telat { background: red; }
</style>

</head>

<body>

<div class="header">
Dashboard Absensi
</div>

<div class="container">

<div class="search-box">
  <input type="text" id="nama" placeholder="Masukkan nama (contoh: Ayung)">
  <button onclick="cari()">Cari</button>
</div>

<div id="hasil"></div>

</div>

<script>

const API = "YOUR_SCRIPT_URL?action=absen&nama=";

async function cari() {

  const nama = document.getElementById("nama").value;

  const res = await fetch(API + nama);
  const data = await res.json();

  const box = document.getElementById("hasil");
  box.innerHTML = "";

  if (!data.length) {
    box.innerHTML = "<p>Tidak ada data</p>";
    return;
  }

  data.forEach(d => {

    let statusClass = "ok";
    if (d.masuk > "09:00") statusClass = "telat";

    box.innerHTML += `
      <div class="card">
        <div class="title">${d.nama} - ${d.tanggal}</div>

        <div class="row"><span>Masuk</span><span>${d.masuk || "-"}</span></div>
        <div class="row"><span>Ist 1</span><span>${d.ist1 || "-"}</span></div>
        <div class="row"><span>Kembali 1</span><span>${d.kembali1 || "-"}</span></div>
        <div class="row"><span>Pulang</span><span>${d.pulang || "-"}</span></div>

        <div class="row">
          <span>Status</span>
          <span class="badge ${statusClass}">
            ${statusClass.toUpperCase()}
          </span>
        </div>
      </div>
    `;

  });

}

</script>

</body>
</html>
