<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Absensi Karyawan</title>

<style>
body{
margin:0;
padding:15px;
background:#f4f6f9;
font-family:Arial,sans-serif;
}

.card{
background:#fff;
border-radius:15px;
padding:15px;
margin-bottom:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
font-size:22px;
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
font-size:16px;
cursor:pointer;
}

.tgl{
font-weight:bold;
font-size:17px;
margin-bottom:8px;
}

.row{
margin:4px 0;
}
</style>
</head>

<body>

<div id="loginBox">

<h1>ABSENSI KARYAWAN</h1>

<div class="card">
<input id="nama" placeholder="Nama">
<input id="pin" type="password" placeholder="PIN">
<button onclick="login()">LOGIN</button>
</div>

</div>

<div id="hasil"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyQrY0plburM7doI2I0A6mGq3_hisHm0w26RbP5VuLorKM7onuxWGgECir_q1-L860c/exec";

async function login(){

const nama=document.getElementById("nama").value.trim();
const pin=document.getElementById("pin").value.trim();

const r=await fetch(
API+
"?action=login&nama="+
encodeURIComponent(nama)+
"&pin="+
encodeURIComponent(pin)
);

const j=await r.json();

if(!j.success){
alert("PIN salah");
return;
}

loadAbsen(nama);

}

async function loadAbsen(nama){

document.getElementById("loginBox").style.display="none";

const r=await fetch(
API+
"?action=absen&nama="+
encodeURIComponent(nama)
);

const data=await r.json();

let html=`<h1>${nama}</h1>`;

data.forEach(x=>{

html+=`
<div class="card">

<div class="tgl">
Tanggal ${x.tanggal}
</div>

<div class="row">Masuk : ${x.masuk||"-"}</div>

${x.ist1?`<div class="row">Istirahat 1 : ${x.ist1}</div>`:""}

${x.kem1?`<div class="row">Kembali 1 : ${x.kem1}</div>`:""}

${x.ist2?`<div class="row">Istirahat 2 : ${x.ist2}</div>`:""}

${x.kem2?`<div class="row">Kembali 2 : ${x.kem2}</div>`:""}

<div class="row">Pulang : ${x.pulang||"-"}</div>

</div>
`;

});

document.getElementById("hasil").innerHTML=html;

}
</script>

</body>
</html>
